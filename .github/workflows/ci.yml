name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]  

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v20
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check


test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v20
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test
      

  